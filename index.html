<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>组件架构可视化工具</title>
    <!-- 引入依赖 -->
    <script src="./js-yaml.min.js"></script>
    <script src="./mermaid.min.js"></script>
    <style>
        body {
            display: flex;
            margin: 10;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.184);
        }

        .panel {
            width: 220px;
            padding: 10px;
            background: #e1f7e575;
        }

        .canvas {
            flex: 1;
            padding: 2px;
            overflow: auto;
        }

        .box-btn {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
    </style>
</head>

<body>
    <!-- 左侧控制面板 -->
    <div class="panel">
        <input type="file" id="fileInput" accept=".yaml,.yml">
        <button class="box-btn" id="resetBtn">恢复全局视图</button>
        <div id="info"></div>
    </div>
    <!-- Mermaid绘图画布 -->
    <div class="canvas" id="mermaidCanvas"></div>

    <script>
        // 初始化Mermaid
        mermaid.initialize({ startOnLoad: false, theme: "default" });
        let allComponents = {}; // 存储完整yaml组件数据
        let renderMode = "full"; // full=全局总览，focus=聚焦单个组件
        let selectedName = "";

        function escapeMermaidLabel(value) {
            return String(value)
                .replace(/"/g, '\\"')
                .replace(/\r?\n/g, " ");
        }

        function getNodeId(name) {
            return String(name).replace(/[^A-Za-z0-9_]/g, "_");
        }

        function getOutputEntries(componentData) {
            if (!componentData || !componentData.outputs) {
                return [];
            }
            const outputs = componentData.outputs;
            if (Array.isArray(outputs)) {
                return outputs.map(name => [name, []]);
            }
            return Object.entries(outputs);
        }

        // 渲染Mermaid图
        function renderChart() {
            let mermaidCode = "graph LR\n";
            const componentNames = Object.keys(allComponents || {});
            if (renderMode === "full") {
                // 全局模式：绘制所有组件和连线
                componentNames.forEach(name => {
                    const nodeId = getNodeId(name);
                    mermaidCode += `    ${nodeId}["${escapeMermaidLabel(name)}"]\n`;
                    getOutputEntries(allComponents[name]).forEach(([targetName, ports]) => {
                        const targetId = getNodeId(targetName);
                        const portList = Array.isArray(ports) ? ports : [];
                        if (portList.length > 0) {
                            portList.forEach(port => {
                                mermaidCode += `    ${nodeId} -- "${escapeMermaidLabel(port)}" --> ${targetId}\n`;
                            });
                        } else {
                            mermaidCode += `    ${nodeId} --> ${targetId}\n`;
                        }
                    });
                });
                console.log("全局视图");
                console.log(mermaidCode);
            } else {
                // 聚焦模式：左右分栏
                const target = selectedName;
                const componentData = allComponents[target] || {};
                const links = getOutputEntries(componentData);
                mermaidCode += `    subgraph 选中组件\n        ${getNodeId(target)}["${escapeMermaidLabel(target)}"]:::selected\n    end\n`;
                mermaidCode += `    subgraph 关联交互组件\n`;
                links.forEach(([name]) => {
                    mermaidCode += `        ${getNodeId(name)}["${escapeMermaidLabel(name)}"]\n`;
                });
                mermaidCode += `    end\n`;
                // 绘制连线
                links.forEach(([name, ports]) => {
                    const portList = Array.isArray(ports) ? ports : [];
                    if (portList.length > 0) {
                        portList.forEach(port => {
                            mermaidCode += `    ${getNodeId(target)} -- "${escapeMermaidLabel(port)}" --> ${getNodeId(name)}\n`;
                        });
                    } else {
                        mermaidCode += `    ${getNodeId(target)} --> ${getNodeId(name)}\n`;
                    }
                });
                // 自定义高亮样式
                mermaidCode += `classDef selected fill:#cce5ff,stroke:#0056b3,stroke-width:3px;`;
                console.log(mermaidCode);
            }
            // 渲染到页面
            const canvas = document.getElementById("mermaidCanvas");
            canvas.innerHTML = `<div class="mermaid">${mermaidCode}</div>`;
            mermaid.run({ nodes: [canvas.querySelector(".mermaid")] });
            // 等待 Mermaid 完成渲染后再绑定点击事件
            setTimeout(bindClick, 50);
        }

        // 绑定框图点击，切换聚焦视图
        function bindClick() {
            const nodes = document.querySelectorAll(".node[data-node='true']");
            nodes.forEach(node => {
                node.style.cursor = "pointer";
                node.onclick = () => {
                    const dataId = node.getAttribute("data-id") || "";
                    let labelText = dataId;
                    const textEl = node.querySelector("text") || node.querySelector("tspan") || node.querySelector("foreignObject");
                    if (textEl && textEl.textContent) {
                        labelText = textEl.textContent.trim();
                    }
                    selectedName = labelText || dataId || node.id;
                    renderMode = "focus";
                    document.getElementById("info").innerText = `当前选中：${selectedName}`;
                    renderChart();
                };
            });
        }

        // 读取本地YAML文件
        document.getElementById("fileInput").onchange = function (e) {
            const file = e.target.files[0];
            if (!file) {
                return;
            }
            const reader = new FileReader();
            reader.onload = function (res) {
                const loaded = jsyaml.load(res.target.result);
                allComponents = loaded && loaded.components ? loaded.components : {};
                renderMode = "full";
                console.log(allComponents);
                renderChart();
            };
            reader.readAsText(file);
        };

        // 重置按钮，切回全局视图
        document.getElementById("resetBtn").onclick = () => {
            renderMode = "full";
            document.getElementById("info").innerText = "";
            renderChart();
        };
    </script>
</body>

</html>
