components:
  # 整车主控 & 传感采集域
  VCU:
    outputs:
      MotorCtrl:
        [驱动扭矩指令, 回馈扭矩限制指令, 电机运行使能, 动力模式切换指令]
      BMS: [整车放电需求指令, 快充使能指令, 高压上电请求, 电池保护阈值配置]
      OBC: [车载充电开启指令, 慢充功率限制指令]
      DCDC: [低压系统上电使能, 怠速稳压控制指令]
      EPB: [行车解锁指令, 驻车锁止强制指令]
      ABS: [动力降扭请求, 制动协同控制指令]
      Display: [整车续航推送, 动力模式显示信号, 系统故障提示信号]
      DCM: [整车系统状态上报, 主动故障检测触发信号]

  AccPedal:
    outputs:
      VCU: [油门踏板开度信号, 踏板变化率信号, 油门踏板有效状态]
      DCM: [油门踏板信号异常诊断]

  BrakePedal:
    outputs:
      VCU: [制动踏板开度信号, 刹车触发状态信号]
      ABS: [人工制动请求信号]
      MotorCtrl: [制动回馈使能信号]

  # 能源管理域
  BMS:
    outputs:
      VCU: [电池SOC实时值, 电池总电压信号, 电池总电流信号, 最大允许放电功率]
      MotorCtrl: [高压系统正常状态, 电池过温保护禁止动力信号]
      OBC: [电池允许充电使能, 充电电压上限阈值, 充电电流上限阈值]
      DCDC: [电池欠压保护锁定信号, 低压负载过载预警]
      Display: [电池温度信号, 剩余电量显示信号, 高压系统状态显示]
      DCM: [电池单体压差故障, 高压回路绝缘故障, 充放电异常故障]

  OBC:
    outputs:
      BMS: [实时充电电压反馈, 实时充电电流反馈, 充电完成状态信号]
      VCU: [外接交流充电接入信号, 充电机待机/工作状态]
      EPB: [充电模式驻车强制锁定信号]
      DCM: [充电机过压故障, 充电机过流故障, 交流输入异常故障]

  DCDC:
    outputs:
      VCU: [低压母线实时电压, 低压负载总功耗, DCDC工作异常状态]
      BMS: [低压回路短路预警信号]
      BodyCtrl: [车身低压供电稳定信号]

  # 动力控制域
  MotorCtrl:
    outputs:
      VCU: [电机实时转速反馈, 电机实际输出扭矩, 电机工作温度状态]
      BMS: [电机高压负载电流反馈, 动力过载需求预警]
      ABS: [驱动轮动力输出状态, 打滑动力实时反馈]
      BrakePedal: [回馈制动执行状态反馈]
      Display: [电机转速显示信号, 动力输出状态提示]
      DCM: [电机过温故障, 电机霍尔信号异常, 动力输出失效故障]

  # 底盘控制域
  EPB:
    outputs:
      VCU: [驻车锁止完成反馈, 驻车解锁完成反馈, EPB故障状态]
      OBC: [驻车锁定状态确认信号]
      MotorCtrl: [驻车状态禁止动力输出信号]
      Display: [驻车指示灯控制信号]

  ABS:
    outputs:
      VCU: [车轮打滑检测信号, 紧急制动触发状态, ABS介入工作状态]
      MotorCtrl: [防打滑动力切断请求]
      DCM: [轮速传感器异常, 制动回路故障]

  # 车身 & 交互域
  BodyCtrl:
    outputs:
      VCU: [整车唤醒信号, 钥匙上电状态信号]
      DCDC: [车身电器负载开启/关闭信号]
      Display: [车灯状态信号, 车身设备工作状态]

  Display:
    outputs:
      VCU: [用户模式手动切换信号, 故障确认清除信号]

  # 诊断服务域
  DCM:
    outputs:
      VCU: [诊断模式激活信号, 故障码读取请求]
      AllSWC: [故障复位指令, 自检程序触发信号]
